<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Your Life Were One Day</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* CSS Variables */
        :root {
            /* DOS Website Background Default - Turbo Cyan */
            --dos-bg: #00AAAA; 

            /* Card Variables (Default Light) */
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #6a737d;
            --border-color: #e1e4e8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 90s DOS Environment styling */
        body {
            background-color: var(--dos-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.4s ease;
            position: relative;
            z-index: 1;
        }

        /* CRT Scanline Effect Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(transparent 50%, rgba(0, 0, 0, 0.15) 50%),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 4px, 20px 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* Exportable Card Themes - Updated Designer Palette */
        /* Note on Contrast: Timeline blocks and main text always work on light, Dark markers adjust via JS */
        
        .card[data-bg="light"] { 
            --card-bg: #ffffff; /* Alabaster */
            --text-main: #1a1a1a; --text-muted: #6a737d; --border-color: #e1e4e8; 
        }
        .card[data-bg="dark"]  { 
            --card-bg: #121212; /* Matte Black */
            --text-main: #ffffff; --text-muted: #9aa0a6; --border-color: #333333; 
        }
        .card[data-bg="cream"]  { 
            --card-bg: #FFFDEB; /* Buttercream Pastel */
            --text-main: #2d2b2a; --text-muted: #857f7a; --border-color: #e6e0d8; 
        }
        .card[data-bg="navy"]  { 
            --card-bg: #0a192f; /* Aesthetic Navy */
            --text-main: #e6f1ff; --text-muted: #8892b0; --border-color: #233554; 
        }
        .card[data-bg="lavender"] { 
            --card-bg: #F3EEFF; /* Lavender Aura */
            --text-main: #1f1b2d; --text-muted: #7d75a1; --border-color: #dad2ed; 
        }
        .card[data-bg="mint"]  { 
            --card-bg: #E8FDF5; /* Sagestone Pastel */
            --text-main: #1a202c; --text-muted: #4a5568; --border-color: #b5eed8; 
        }
        .card[data-bg="pink"] { 
            --card-bg: #FFECF2; /* Sakura Petal Pink */
            --text-main: #2d3748; --text-muted: #718096; --border-color: #f7d2dc; 
        }
        .card[data-bg="mocha"] { 
            --card-bg: #3e2723; /* Dark Espresso */
            --text-main: #efebe9; --text-muted: #bcaaa4; --border-color: #5d4037; 
        }

        .card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            padding: 40px 30px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .time-display {
            text-align: center;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 40px;
            color: var(--text-main);
        }

        /* Timeline Visualization */
        .timeline-wrapper {
            margin-bottom: 60px;
        }

        .timeline-container {
            position: relative;
            height: 40px;
            border-radius: 6px;
            background-color: var(--border-color);
            overflow: hidden;
            display: flex;
        }

        .block {
            height: 100%;
            border-right: 1px solid rgba(255, 255, 255, 0.4);
        }

        .block:last-child {
            border-right: none;
        }

        /* Prominent Current Age Marker */
        .blinking-dot {
            position: absolute;
            top: -8px;
            width: 4px;
            height: 56px;
            background-color: #ff2a55;
            border-radius: 4px;
            box-shadow: 0 0 0 2px var(--card-bg), 0 0 12px rgba(255, 42, 85, 0.8);
            transform: translateX(-50%);
            transition: left 0.5s ease;
            animation: blink 1.5s infinite;
            z-index: 10;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Dynamic Markers */
        .markers-container {
            position: relative;
            height: 40px;
            margin-top: 8px;
        }

        .marker-group {
            position: absolute;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
        }

        .marker-group[data-edge="start"] { transform: translateX(0%); align-items: flex-start; }
        .marker-group[data-edge="end"] { transform: translateX(-100%); align-items: flex-end; }

        .marker-line {
            position: absolute;
            top: -8px;
            height: 4px;
            width: 1px;
            background-color: var(--text-muted);
            opacity: 0.5;
        }

        .marker-age {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .marker-time {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            opacity: 0.8;
        }

        /* Controls Section */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-top: 20px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .dos-note {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            opacity: 0.7;
        }

        input[type="date"], input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
            background-color: transparent;
            color: var(--text-main);
            appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--text-main);
        }

        .row {
            display: flex;
            gap: 15px;
        }
        .row .input-group {
            flex: 1;
        }

        /* Color Grids */
        .theme-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .theme-card, .bg-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            color: var(--text-main);
        }

        .theme-card input, .bg-card input {
            display: none;
        }

        .theme-card:has(input:checked), .bg-card:has(input:checked) {
            border-color: var(--text-main);
            box-shadow: 0 0 0 1px var(--text-main);
        }

        .theme-preview {
            width: 40px;
            height: 16px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        
        .bg-preview {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
        }

        .theme-card span, .bg-card span { font-size: 13px; font-weight: 500; }

        /* Export Button */
        .export-btn {
            background-color: var(--text-main);
            color: var(--card-bg);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .export-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="card" id="main-card" data-bg="light">
        <div id="export-area">
            <div class="header">
                <h1>If Your Life Were One Day</h1>
                <p>Your lifespan visualized as a single 24 hour day.</p>
            </div>

            <div class="time-display" id="clock-display">00:00</div>

            <div class="timeline-wrapper">
                <div class="timeline-container" id="timeline">
                    <div class="blinking-dot" id="dot" style="left: 0%;"></div>
                </div>
                <div class="markers-container" id="markers"></div>
            </div>
        </div>

        <div class="controls" id="controls">
            <div class="input-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" value="1990-01-01">
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="lifespan">Expected Lifespan</label>
                    <input type="number" id="lifespan" value="100" min="1" max="150">
                </div>
                
                <div class="input-group">
                    <label for="interval">Years per Block</label>
                    <select id="interval">
                        <option value="1">1 Year</option>
                        <option value="5">5 Years</option>
                        <option value="10" selected>10 Years</option>
                        <option value="15">15 Years</option>
                        <option value="20">20 Years</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Timeline Color</label>
                <div class="theme-grid" id="theme-grid"></div>
            </div>

            <div class="input-group">
                <label>IG Card Background</label>
                <div class="theme-grid" id="bg-grid"></div>
            </div>

            <div class="input-group" style="margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 20px;">
                <label>Website Environment <span class="dos-note">(90s DOS Style - Not Exported)</span></label>
                <select id="dos-theme">
                    <option value="#0000AA">Classic Blue (Norton Commander)</option>
                    <option value="#000000">Terminal Black (MS-DOS)</option>
                    <option value="#00AAAA" selected>Turbo Cyan (Borland)</option>
                    <option value="#AA00AA">Magenta CRT (QBasic)</option>
                </select>
            </div>

            <button class="export-btn" onclick="exportToIG()">Export</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const dobInput = document.getElementById('dob');
        const lifespanInput = document.getElementById('lifespan');
        const intervalInput = document.getElementById('interval');
        const timeline = document.getElementById('timeline');
        const markersContainer = document.getElementById('markers');
        const dot = document.getElementById('dot');
        const clockDisplay = document.getElementById('clock-display');
        const themeGrid = document.getElementById('theme-grid');
        const bgGrid = document.getElementById('bg-grid');
        const mainCard = document.getElementById('main-card');
        const dosThemeSelect = document.getElementById('dos-theme');

        // Palettes
        const themes = {
            sunrise:  { name: 'Sunrise',  colors: ['#fee8c8', '#fdbb84', '#e34a33', '#7a0177'] },
            ocean:    { name: 'Ocean',    colors: ['#e0f3db', '#a8ddb5', '#43a2ca', '#0868ac'] },
            magma:    { name: 'Magma',    colors: ['#fcc5c0', '#fa9fb5', '#c51b8a', '#4d004b'] },
            forest:   { name: 'Forest',   colors: ['#edf8fb', '#b2e2e2', '#66c2a4', '#2ca25f', '#005824'] },
            market:   { name: 'Market',   colors: ['#e5f5e0', '#a1d99b', '#31a354', '#006d2c'] },
            fire:     { name: 'Fire',     colors: ['#ffffb2', '#fecc5c', '#fd8d3c', '#f03b20', '#bd0026'] },
            dusk:     { name: 'Dusk',     colors: ['#f2f0f7', '#cbc9e2', '#9e9ac8', '#756bb1', '#54278f'] },
            glacier:  { name: 'Glacier',  colors: ['#f7fcf0', '#ccebc5', '#7bccc4', '#2b8cbe', '#08589e'] }
        };

        // NEW Aesthetic Palette for Card Backgrounds
        const backgrounds = {
            light:    { data: 'light',    name: 'Alabaster',     color: '#ffffff' }, // Pure default
            dark:     { data: 'dark',     name: 'Matte Black',   color: '#121212' },
            cream:    { data: 'cream',    name: 'Buttercream',   color: '#FFFDEB' }, // Distinct Pastel Yellow
            navy:     { data: 'navy',     name: 'Navy Aura',     color: '#0a192f' },
            lavender: { data: 'lavender', name: 'Lavender Aura', color: '#F3EEFF' }, // Replaced Slate
            mint:     { data: 'mint',     name: 'Sagestone',     color: '#E8FDF5' }, // More distinct Mint/Green
            pink:     { data: 'pink',     name: 'Sakura',        color: '#FFECF2' }, // Distinct Pastel Pink
            mocha:    { data: 'mocha',    name: 'Mocha',         color: '#3e2723' }
        };

        let currentThemeKey = 'sunrise';
        let currentBgKey = 'light';

        // --- Initialization --- //
        function initUI() {
            // Timeline Themes
            Object.keys(themes).forEach(key => {
                const t = themes[key];
                const card = document.createElement('label');
                card.className = 'theme-card';
                
                const input = document.createElement('input');
                input.type = 'radio'; input.name = 'theme'; input.value = key;
                if (key === currentThemeKey) input.checked = true;
                input.addEventListener('change', (e) => { currentThemeKey = e.target.value; updateApp(); });

                const preview = document.createElement('div');
                preview.className = 'theme-preview';
                preview.style.background = `linear-gradient(to right, ${t.colors.join(', ')})`;

                const nameSpan = document.createElement('span'); nameSpan.textContent = t.name;
                card.append(input, preview, nameSpan);
                themeGrid.appendChild(card);
            });

            // Card Background Themes - Updated mapping to new object structure
            Object.keys(backgrounds).forEach(key => {
                const bg = backgrounds[key];
                const card = document.createElement('label');
                card.className = 'bg-card';
                
                const input = document.createElement('input');
                input.type = 'radio'; input.name = 'bg'; input.value = key;
                if (key === currentBgKey) input.checked = true;
                input.addEventListener('change', (e) => { 
                    currentBgKey = e.target.value; 
                    mainCard.setAttribute('data-bg', backgrounds[currentBgKey].data);
                });

                const preview = document.createElement('div');
                preview.className = 'bg-preview';
                preview.style.backgroundColor = bg.color;

                const nameSpan = document.createElement('span'); nameSpan.textContent = bg.name;
                card.append(input, preview, nameSpan);
                bgGrid.appendChild(card);
            });

            // DOS Website Background listener
            dosThemeSelect.addEventListener('change', (e) => {
                document.documentElement.style.setProperty('--dos-bg', e.target.value);
            });
        }

        // --- Color Math --- //
        function hexToRgb(hex) {
            let r = 0, g = 0, b = 0;
            if (hex.length == 4) { r = parseInt(hex[1]+hex[1], 16); g = parseInt(hex[2]+hex[2], 16); b = parseInt(hex[3]+hex[3], 16); } 
            else if (hex.length == 7) { r = parseInt(hex.substring(1,3), 16); g = parseInt(hex.substring(3,5), 16); b = parseInt(hex.substring(5,7), 16); }
            return [r, g, b];
        }

        function interpolateColor(c1, c2, factor) {
            return [Math.round(c1[0] + factor * (c2[0] - c1[0])), Math.round(c1[1] + factor * (c2[1] - c1[1])), Math.round(c1[2] + factor * (c2[2] - c1[2]))];
        }

        function generatePalette(baseColorsHex, numSteps) {
            if (numSteps === 1) return [baseColorsHex[baseColorsHex.length - 1]];
            const baseColors = baseColorsHex.map(hexToRgb);
            const palette = [];
            for (let i = 0; i < numSteps; i++) {
                const pos = i / (numSteps - 1);
                const scaledPos = pos * (baseColors.length - 1);
                const idx = Math.floor(scaledPos);
                const factor = scaledPos - idx;
                let color = (idx >= baseColors.length - 1) ? baseColors[baseColors.length - 1] : interpolateColor(baseColors[idx], baseColors[idx + 1], factor);
                palette.push(`rgb(${color[0]}, ${color[1]}, ${color[2]})`);
            }
            return palette;
        }

        // --- Time Format --- //
        function formatTimeString(progressPercent) {
            const currentHours = (progressPercent / 100) * 24;
            let hrs = Math.floor(currentHours);
            let mins = Math.round((currentHours - hrs) * 60);

            if (mins === 60) { hrs += 1; mins = 0; }

            let period = (hrs >= 12 && hrs < 24) ? 'PM' : 'AM';
            let displayHrs = hrs % 12;
            displayHrs = displayHrs ? displayHrs : 12;
            let displayMins = mins === 0 ? '' : ':' + (mins < 10 ? '0' + mins : mins);

            return `${displayHrs}${displayMins}${period}`;
        }

        // --- Main Logic --- //
        function updateApp() {
            renderTimeline();
            updateClock();
        }

        function renderTimeline() {
            const blocks = timeline.querySelectorAll('.block');
            blocks.forEach(b => b.remove());
            markersContainer.innerHTML = '';

            const lifespan = parseFloat(lifespanInput.value) || 100;
            const interval = parseFloat(intervalInput.value) || 10;
            const selectedThemeColors = themes[currentThemeKey].colors;
            
            const numBlocks = Math.ceil(lifespan / interval);
            const blockColors = generatePalette(selectedThemeColors, numBlocks);

            for (let i = 0; i < numBlocks; i++) {
                const block = document.createElement('div');
                block.className = 'block';
                let blockYears = interval;
                if ((i * interval) + interval > lifespan) blockYears = lifespan - (i * interval);
                block.style.width = `${(blockYears / lifespan) * 100}%`;
                block.style.backgroundColor = blockColors[i];
                timeline.insertBefore(block, dot);
            }

            let labelStep = interval;
            if (interval === 1 || interval === 5) labelStep = 20; 

            const markerAges = new Set();
            for (let age = 0; age <= lifespan; age += labelStep) { markerAges.add(age); }
            markerAges.add(lifespan); 

            const sortedAges = Array.from(markerAges).sort((a,b) => a - b);

            sortedAges.forEach(age => {
                const group = document.createElement('div');
                group.className = 'marker-group';
                
                const leftPosition = (age / lifespan) * 100;
                group.style.left = `${leftPosition}%`;

                if (age === 0) group.dataset.edge = "start";
                if (age === lifespan) group.dataset.edge = "end";

                const line = document.createElement('div'); line.className = 'marker-line';
                const ageLabel = document.createElement('div'); ageLabel.className = 'marker-age'; ageLabel.textContent = `${age}y`;
                const timeLabel = document.createElement('div'); timeLabel.className = 'marker-time'; timeLabel.textContent = formatTimeString(leftPosition);

                group.append(line, ageLabel, timeLabel);
                markersContainer.appendChild(group);
            });
        }

        function updateClock() {
            const dob = new Date(dobInput.value);
            const today = new Date();
            const lifespan = parseFloat(lifespanInput.value) || 100;

            if (isNaN(dob.getTime())) { clockDisplay.textContent = "--:--"; return; }

            const ageInYears = (today - dob) / (1000 * 60 * 60 * 24 * 365.25);
            let progress = (ageInYears / lifespan) * 100;
            progress = Math.max(0, Math.min(progress, 100)); 

            dot.style.left = `${progress}%`;
            clockDisplay.textContent = formatTimeString(progress);
        }

        // --- Export to PNG --- //
        async function exportToIG() {
            const controls = document.getElementById('controls');
            const card = document.getElementById('main-card');
            
            controls.style.display = 'none';
            card.style.paddingBottom = '60px'; 
            card.style.boxShadow = 'none'; // Temporarily drop the shadow so the export border is totally clean

            await new Promise(res => setTimeout(res, 50));

            const canvas = await html2canvas(card, {
                scale: 3, 
                backgroundColor: null, 
                useCORS: true
            });

            controls.style.display = 'flex';
            card.style.paddingBottom = '40px';
            card.style.boxShadow = ''; // Restore the shadow

            const link = document.createElement('a');
            link.download = 'my-life-clock.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Event Listeners
        dobInput.addEventListener('change', updateApp);
        lifespanInput.addEventListener('input', updateApp);
        intervalInput.addEventListener('change', updateApp);

        // Run
        initUI();
        updateApp();
    </script>
</body>
</html>
